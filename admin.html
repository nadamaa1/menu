
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Concordia Restaurant</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#faf8f4;font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh}
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#fff;border:1px solid #e8e0d5;border-radius:20px;padding:48px 36px;max-width:380px;width:100%;text-align:center}
.card h1{font-family:'Playfair Display',serif;font-size:26px;color:#b83a1a;margin-bottom:4px}
.card .sub{font-size:13px;color:#9a8878;margin-bottom:32px}
.field{margin-bottom:14px;text-align:left}
.field label{font-size:12px;color:#9a8878;display:block;margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
.field input{width:100%;background:#faf8f4;border:1px solid #e8e0d5;border-radius:10px;padding:13px 16px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.field input:focus{border-color:#b83a1a}
.field input[type=password]{letter-spacing:3px}
.err{font-size:12px;color:#b83a1a;margin-bottom:12px;display:none;background:#fdf0f0;border:1px solid #f0c8c8;border-radius:8px;padding:8px 12px}
.btn{width:100%;background:#b83a1a;color:#fff;border:none;padding:14px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:background .2s;margin-top:8px}
.btn:hover{background:#9a2e12}
.hint{font-size:11px;color:#b8a898;margin-top:20px;line-height:1.6}

#admin{display:none}
.topbar{background:#fff;border-bottom:1px solid #e8e0d5;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h2{font-family:'Playfair Display',serif;font-size:19px;color:#b83a1a}
.topbar p{font-size:11px;color:#9a8878;margin-top:1px}
.pub-btn{background:#b83a1a;color:#fff;border:none;padding:11px 24px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px}
.pub-btn:hover{background:#9a2e12}
.pub-btn:disabled{opacity:.5;cursor:not-allowed;background:#9a8878}

.wrap{max-width:600px;margin:0 auto;padding:28px 20px}
.status{background:#fff;border:1px solid #e8e0d5;border-radius:12px;padding:12px 18px;margin-bottom:24px;font-size:13px;color:#7a6a5a;display:flex;align-items:center;gap:10px;transition:all .3s}
.status.ok{border-color:#6abf85;background:#f0faf4;color:#2d7a4a}
.status.err2{border-color:#f0a0a0;background:#fdf0f0;color:#b83a1a}
.dot{width:8px;height:8px;border-radius:50%;background:#d4c8bc;flex-shrink:0}
.status.ok .dot{background:#6abf85}
.status.err2 .dot{background:#e86a5a}

.sec{margin-bottom:28px}
.sec-title{font-family:'Playfair Display',serif;font-size:21px;font-style:italic;color:#b83a1a;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #e8d5c8}
.row{background:#fff;border:1px solid #e8e0d5;border-radius:12px;padding:14px 18px;margin-bottom:8px;display:flex;align-items:center;gap:14px;transition:all .2s}
.row.off{background:#fdf8f6;border-color:#f0d8d0}
.ri{flex:1}
.rn{font-family:'Playfair Display',serif;font-size:15px;color:#2a2118;margin-bottom:2px}
.row.off .rn{text-decoration:line-through;color:#9a8878}
.rd{font-size:11px;color:#9a8878;margin-top:2px;line-height:1.4}
.rp{font-size:12px;color:#b83a1a;font-weight:500;margin-top:3px}
.rl{font-size:11px;flex-shrink:0;width:56px;text-align:right;font-weight:500}
.row:not(.off) .rl{color:#6abf85}
.row.off .rl{color:#c0a898}
.tog{position:relative;width:42px;height:23px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tsl{position:absolute;inset:0;background:#d4c8bc;border-radius:12px;cursor:pointer;transition:.2s}
.tsl::after{content:'';position:absolute;width:17px;height:17px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.tog input:checked+.tsl{background:#6abf85}
.tog input:checked+.tsl::after{transform:translateX(19px)}
</style>
</head>
<body>

<div id="login">
  <div class="card">
    <h1>Concordia</h1>
    <div class="sub">Administration du menu</div>
    <div class="err" id="err"></div>

    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="pwd" placeholder="••••••••">
    </div>
    <div class="field">
      <label>Token GitHub <span style="color:#b83a1a">*</span></label>
      <input type="password" id="tok" placeholder="ghp_...">
    </div>
    <button class="btn" onclick="login()">Connexion</button>
    <div class="hint">
      * Le token GitHub vous permet de publier<br>les changements directement sur le site.<br>
      Il n'est jamais stocké ni envoyé ailleurs.
    </div>
  </div>
</div>

<div id="admin">
  <div class="topbar">
    <div>
      <h2>Concordia Restaurant</h2>
      <p id="last-update">Aucune modification publiée</p>
    </div>
    <button class="pub-btn" id="pub-btn" onclick="publish()">
      <span id="pub-icon">✓</span>
      <span id="pub-txt">Publier</span>
    </button>
  </div>
  <div class="wrap">
    <div class="status" id="status">
      <div class="dot"></div>
      <span id="status-txt">Activez ou désactivez les plats, puis publiez.</span>
    </div>
    <div id="sections"></div>
  </div>
</div>

<script>
var PWD = 'concordia2024';
var TOKEN = '';
var OWNER = 'nadamaa1';
var REPO  = 'menu';
var FILE  = 'index.html';

var MENU = {
  name: 'Concordia Restaurant',
  sections: [
    { title: 'Entrées', items: [
      { name: 'Salade de chèvre chaud', desc: 'Toasts de chèvre fondant sur lit de roquette, noix caramélisées, miel de fleurs et vinaigrette balsamique.', price: '9€', available: true },
      { name: 'Tartare de saumon frais', desc: 'Dés de saumon mariné aux agrumes, avocat crémeux, touche de ciboulette, accompagné de blinis croustillants.', price: '11€', available: true },
    ]},
    { title: 'Plats', items: [
      { name: 'Entrecôte grillée, sauce au poivre', desc: 'Entrecôte de bœuf maturée, servie avec frites maison croustillantes et salade verte, nappée de sauce au poivre crémeuse.', price: '24€', available: true },
      { name: 'Magret de canard aux figues', desc: "Magret de canard rôti, réduction de vin rouge et figues confites, accompagné d'un écrasé de pommes de terre à l'huile de truffe.", price: '19€', available: true },
      { name: 'Risotto aux champignons sauvages', desc: "Risotto crémeux à l'arôme intense de champignons forestiers, agrémenté de parmesan fraîchement râpé et de persil.", price: '17€', available: true },
    ]},
    { title: 'Desserts', items: [
      { name: 'Tarte tatin maison', desc: 'Pommes caramélisées, pâte feuilletée dorée, servie tiède avec une boule de glace vanille.', price: '6€', available: true },
      { name: 'Café gourmand', desc: 'Sélection de mini-desserts maison : macaron, financier, mousse au chocolat, et sorbet citron, accompagné d\'un espresso.', price: '7€', available: true },
    ]},
  ]
};

function login() {
  var p = document.getElementById('pwd').value;
  var t = document.getElementById('tok').value.trim();
  var err = document.getElementById('err');
  if(p !== PWD) { err.textContent='Mot de passe incorrect'; err.style.display='block'; return; }
  if(!t.startsWith('ghp_')) { err.textContent='Token GitHub invalide (doit commencer par ghp_)'; err.style.display='block'; return; }
  TOKEN = t;
  document.getElementById('login').style.display='none';
  document.getElementById('admin').style.display='block';
  renderMenu();
}

function renderMenu() {
  var c = document.getElementById('sections'); c.innerHTML='';
  MENU.sections.forEach(function(s, si) {
    var div = document.createElement('div'); div.className='sec';
    div.innerHTML = '<div class="sec-title">'+s.title+'</div>' +
      s.items.map(function(it, ii) {
        return '<div class="row'+(it.available?'':' off')+'" id="r'+si+'-'+ii+'">' +
          '<div class="ri"><div class="rn">'+it.name+'</div><div class="rd">'+it.desc+'</div><div class="rp">'+it.price+'</div></div>' +
          '<span class="rl" id="l'+si+'-'+ii+'">'+(it.available?'Dispo':'Indispo')+'</span>' +
          '<label class="tog"><input type="checkbox"'+(it.available?' checked':'')+' onchange="toggle('+si+','+ii+',this.checked)"><span class="tsl"></span></label>' +
        '</div>';
      }).join('');
    c.appendChild(div);
  });
}

function toggle(si, ii, val) {
  MENU.sections[si].items[ii].available = val;
  document.getElementById('r'+si+'-'+ii).className = 'row'+(val?'':' off');
  document.getElementById('l'+si+'-'+ii).textContent = val?'Dispo':'Indispo';
}

function buildHTML() {
  var d = new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  return '<!DOCTYPE html>\n<html lang="fr">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1">\n<title>Concordia Restaurant</title>\n<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">\n<style>\n*{box-sizing:border-box;margin:0;padding:0}\nbody{background:#faf8f4;color:#2a2118;font-family:\'DM Sans\',sans-serif;font-weight:300;min-height:100vh}\n.page{max-width:560px;margin:0 auto;padding:48px 28px 80px}\n.header{text-align:center;margin-bottom:48px;padding-bottom:32px;border-bottom:1px solid #e8e0d5}\n.header h1{font-family:\'Playfair Display\',serif;font-size:36px;font-weight:600;color:#b83a1a;letter-spacing:-.5px;line-height:1.2;margin-bottom:6px}\n.header p{font-size:13px;color:#9a8878;letter-spacing:.04em}\n.section{margin-bottom:40px}\n.section-title{font-family:\'Playfair Display\',serif;font-size:28px;font-style:italic;color:#b83a1a;margin-bottom:24px;padding-bottom:10px;border-bottom:1px solid #e8d5c8}\n.item{display:flex;align-items:flex-start;gap:12px;padding:16px 0;border-bottom:1px solid #f0ece6}\n.item:last-child{border-bottom:none}\n.item.off{opacity:.4}\n.item-left{flex:1}\n.item-name{font-family:\'Playfair Display\',serif;font-size:18px;font-weight:400;color:#2a2118;margin-bottom:5px;line-height:1.3}\n.item.off .item-name{text-decoration:line-through;color:#9a8878}\n.item-desc{font-size:13px;color:#7a6a5a;line-height:1.6;font-style:italic}\n.item-right{flex-shrink:0;text-align:right;padding-top:2px}\n.item-price{font-family:\'Playfair Display\',serif;font-size:18px;color:#b83a1a}\n.badge-off{display:inline-block;font-size:10px;background:#f5ede8;color:#b83a1a;border:1px solid #e8c8bc;padding:2px 8px;border-radius:100px;margin-top:6px}\n.footer{text-align:center;margin-top:48px;padding-top:24px;border-top:1px solid #e8e0d5;font-size:12px;color:#b8a898}\n</style>\n</head>\n<body>\n<div class="page">\n<div class="header"><h1>Concordia Restaurant</h1><p>Menu du '+d+'</p></div>\n' +
    MENU.sections.map(function(s){
      return '<div class="section"><div class="section-title">'+s.title+'</div>' +
        s.items.map(function(it){
          return '<div class="item'+(it.available?'':' off')+'"><div class="item-left"><div class="item-name">'+it.name+'</div><div class="item-desc">'+it.desc+'</div>'+(it.available?'':'<div class="badge-off">Indisponible aujourd\'hui</div>')+'</div><div class="item-right"><div class="item-price">'+it.price+'</div></div></div>';
        }).join('') + '</div>';
    }).join('') +
    '\n<div class="footer">Concordia Restaurant &nbsp;·&nbsp; '+d+'</div>\n</div>\n</body>\n</html>';
}

async function publish() {
  var btn=document.getElementById('pub-btn');
  var icon=document.getElementById('pub-icon');
  var txt=document.getElementById('pub-txt');
  var st=document.getElementById('status');
  var stxt=document.getElementById('status-txt');
  btn.disabled=true; icon.textContent='⏳'; txt.textContent='Publication…';
  try {
    var r1 = await fetch('https://api.github.com/repos/'+OWNER+'/'+REPO+'/contents/'+FILE,{
      headers:{'Authorization':'token '+TOKEN,'Accept':'application/vnd.github.v3+json'}
    });
    if(!r1.ok) throw new Error('Erreur GitHub '+r1.status+' — vérifiez votre token');
    var d1 = await r1.json();
    var html = buildHTML();
    var enc = btoa(unescape(encodeURIComponent(html)));
    var r2 = await fetch('https://api.github.com/repos/'+OWNER+'/'+REPO+'/contents/'+FILE,{
      method:'PUT',
      headers:{'Authorization':'token '+TOKEN,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({message:'Mise à jour du menu',content:enc,sha:d1.sha})
    });
    if(!r2.ok) throw new Error('Erreur GitHub '+r2.status);
    st.className='status ok'; stxt.textContent='✓ Menu publié ! Visible sur le site dans ~30 secondes.';
    document.getElementById('last-update').textContent='Publié à '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    st.className='status err2'; stxt.textContent='✗ '+e.message;
  }
  btn.disabled=false; icon.textContent='✓'; txt.textContent='Publier';
}
</script>
</body>
</html>
