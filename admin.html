
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Bistrot du Grand Liot</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f7f4ee;font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh}
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#fff;border:1px solid #ddd5c0;border-radius:20px;padding:48px 36px;max-width:380px;width:100%;text-align:center}
.card h1{font-family:'Playfair Display',serif;font-size:24px;color:#3d2b1a;margin-bottom:4px}
.card .sub{font-size:13px;color:#8a7a6a;margin-bottom:32px}
.field{margin-bottom:14px;text-align:left}
.field label{font-size:12px;color:#8a7a6a;display:block;margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
.field input{width:100%;background:#f7f4ee;border:1px solid #ddd5c0;border-radius:10px;padding:13px 16px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.field input:focus{border-color:#3d2b1a}
.err{font-size:12px;color:#b83a1a;margin-bottom:12px;display:none;background:#fdf0f0;border:1px solid #f0c8c8;border-radius:8px;padding:8px 12px}
.btn-login{width:100%;background:#3d2b1a;color:#f7f4ee;border:none;padding:14px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;margin-top:8px}
#admin{display:none}
.topbar{background:#fff;border-bottom:1px solid #ddd5c0;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;gap:12px}
.topbar h2{font-family:'Playfair Display',serif;font-size:17px;color:#3d2b1a}
.topbar p{font-size:11px;color:#8a7a6a;margin-top:1px}
.pub-btn{background:#3d2b1a;color:#f7f4ee;border:none;padding:11px 22px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:7px;flex-shrink:0}
.pub-btn:disabled{opacity:.5;cursor:not-allowed}
.wrap{max-width:680px;margin:0 auto;padding:24px 16px}
.status{background:#fff;border:1px solid #ddd5c0;border-radius:12px;padding:12px 18px;margin-bottom:20px;font-size:13px;color:#7a6a5a;display:flex;align-items:center;gap:10px;transition:all .3s}
.status.ok{border-color:#6abf85;background:#f0faf4;color:#2d7a4a}
.status.ko{border-color:#f0a0a0;background:#fdf0f0;color:#b83a1a}
.dot{width:8px;height:8px;border-radius:50%;background:#d4c8bc;flex-shrink:0}
.status.ok .dot{background:#6abf85}.status.ko .dot{background:#e86a5a}
.sec{margin-bottom:20px;background:#fff;border:1px solid #ddd5c0;border-radius:14px;overflow:hidden}
.sec-head{display:flex;align-items:center;gap:10px;padding:12px 18px;background:#f7f4ee;border-bottom:1px solid #ece5d8}
.sec-title-input{font-family:'Playfair Display',serif;font-size:17px;color:#3d2b1a;background:transparent;border:none;outline:none;flex:1;font-weight:600}
.sec-del{background:transparent;border:1px solid #ddd5c0;color:#b8a898;font-size:12px;padding:3px 10px;border-radius:100px;cursor:pointer;font-family:'DM Sans',sans-serif}
.sec-add{background:transparent;border:1px solid #c8e0c8;color:#6abf85;font-size:12px;padding:3px 10px;border-radius:100px;cursor:pointer;font-family:'DM Sans',sans-serif}
.row{border-bottom:1px solid #f0ece5;padding:11px 18px;display:flex;align-items:flex-start;gap:12px}
.row:last-child{border-bottom:none}.row.off{background:#fdfaf8}
.row-fields{flex:1;display:grid;grid-template-columns:1fr auto;gap:8px}
.row-name{font-size:14px;color:#2a2118;background:transparent;border:none;outline:none;width:100%;padding:3px 0;border-bottom:1px solid transparent;font-family:'DM Sans',sans-serif}
.row-name:focus{border-bottom-color:#ddd5c0}
.row.off .row-name{text-decoration:line-through;color:#9a8878}
.row-desc{font-size:12px;color:#9a8878;background:transparent;border:none;outline:none;width:100%;padding:2px 0;font-family:'DM Sans',sans-serif}
.row-price{font-size:13px;color:#3d2b1a;font-weight:500;background:transparent;border:1px solid #ddd5c0;border-radius:8px;padding:5px 10px;outline:none;width:72px;font-family:'DM Sans',sans-serif;text-align:center}
.row-right{display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0}
.row-del{background:transparent;border:none;color:#d4c8bc;cursor:pointer;font-size:15px;padding:2px}
.row-del:hover{color:#b83a1a}
.tog{position:relative;width:40px;height:22px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tsl{position:absolute;inset:0;background:#d4c8bc;border-radius:11px;cursor:pointer;transition:.2s}
.tsl::after{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.tog input:checked+.tsl{background:#6abf85}
.tog input:checked+.tsl::after{transform:translateX(18px)}
.add-sec-btn{width:100%;background:transparent;border:1.5px dashed #ddd5c0;border-radius:12px;padding:13px;color:#b8a898;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;margin-bottom:24px}
</style>
</head>
<body>

<div id="login">
  <div class="card">
    <h1>Bistrot du Grand Liot</h1>
    <div class="sub">Administration du menu</div>
    <div class="err" id="err"></div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn-login" onclick="login()">Connexion</button>
  </div>
</div>

<div id="admin">
  <div class="topbar">
    <div><h2>Bistrot du Grand Liot</h2><p id="last-pub">Aucune publication</p></div>
    <button class="pub-btn" id="pub-btn" onclick="publish()"><span id="pub-icon">✓</span><span id="pub-txt">Publier</span></button>
  </div>
  <div class="wrap">
    <div class="status" id="status"><div class="dot"></div><span id="stxt">Modifiez le menu puis cliquez Publier.</span></div>
    <div id="sections"></div>
    <button class="add-sec-btn" onclick="addSection()">+ Ajouter une section</button>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyDuqkUJ_pEr4n-RbbP8rCnJWz-tBwMeBns",
  authDomain: "menuscan-a0ead.firebaseapp.com",
  projectId: "menuscan-a0ead",
  appId: "1:865935761009:web:1c161538574d297b0745d0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const RESTO_ID = 'bistrot-grand-liot';
const PWD = 'grandliot2024';

let MENU = {name:'Bistrot du Grand Liot', sections:[
  {title:'Entrées',items:[
    {name:'Oeuf mayo',desc:'',price:'3€',available:true},
    {name:'Pâté Berrichon',desc:'',price:'7€',available:true},
    {name:'Saumon gravlax',desc:'',price:'8,5€',available:true},
    {name:'Os à moelle en persillade',desc:'',price:'8,5€',available:true},
  ]},
  {title:'Plats — Côté terre',items:[
    {name:'Jambon grillé',desc:'',price:'9,5€',available:true},
    {name:'Tartare de boeuf asiatique',desc:'',price:'16€',available:true},
    {name:'Suprême de pintade fermière',desc:'',price:'16,5€',available:true},
    {name:'Onglet de boeuf 180g',desc:'',price:'18€',available:true},
    {name:'Côte de boeuf charolaise 1,2kg',desc:'Sur réservation',price:'65€',available:true},
  ]},
  {title:'Plats — Côté mer',items:[
    {name:'Pavé de lieu ou merlu',desc:'',price:'16,5€',available:true},
    {name:'Gambas flambées (x6)',desc:'',price:'21€',available:true},
  ]},
  {title:'Accompagnements',items:[
    {name:'Grenailles confites à l\'ail',desc:'Au choix',price:'',available:true},
    {name:'Mousseline de carottes',desc:'Au choix',price:'',available:true},
    {name:'Patate douce rôtie',desc:'Au choix',price:'',available:true},
    {name:'Riz noir aux épices',desc:'Au choix',price:'',available:true},
  ]},
  {title:'Fromages',items:[
    {name:'Nougat glacé',desc:'',price:'8€',available:true},
    {name:'Assiette de fromages',desc:'',price:'7€',available:true},
  ]},
  {title:'Desserts',items:[
    {name:'Café mignardises',desc:'',price:'3,5€',available:true},
    {name:'Brownie caramel',desc:'',price:'7,5€',available:true},
    {name:'L\'île flottante',desc:'',price:'5,5€',available:true},
    {name:'Choux glacé',desc:'',price:'7,5€',available:true},
  ]},
  {title:'À Partager',items:[
    {name:'Planche de charcuterie',desc:'Apéro',price:'10€',available:true},
    {name:'Planche de saumon',desc:'Apéro',price:'12€',available:true},
    {name:'Plateau de fromages',desc:'Apéro',price:'5€/pers.',available:true},
    {name:'Magret entier',desc:'Plat à partager',price:'28€',available:true},
    {name:'Cabillaud pané',desc:'Plat à partager',price:'25€',available:true},
  ]},
]};

// Load latest from Firebase on login
window.login = async function() {
  const p = document.getElementById('pwd').value;
  const err = document.getElementById('err');
  if(p !== PWD){ err.textContent='Mot de passe incorrect'; err.style.display='block'; return; }
  err.style.display='none';
  // Load current menu from Firebase
  try {
    const snap = await getDoc(doc(db, 'menus', RESTO_ID));
    if(snap.exists()) MENU = snap.data();
  } catch(e) { /* use default */ }
  document.getElementById('login').style.display='none';
  document.getElementById('admin').style.display='block';
  render();
};

function render(){
  const c=document.getElementById('sections'); c.innerHTML='';
  MENU.sections.forEach((s,si)=>{
    const div=document.createElement('div'); div.className='sec';
    div.innerHTML=`<div class="sec-head"><input class="sec-title-input" value="${esc(s.title)}" oninput="MENU.sections[${si}].title=this.value"><button class="sec-add" onclick="addItem(${si})">+ Plat</button><button class="sec-del" onclick="delSection(${si})">Supprimer</button></div><div id="items-${si}">${s.items.map((it,ii)=>rowHTML(si,ii,it)).join('')}</div>`;
    c.appendChild(div);
  });
}

function rowHTML(si,ii,it){
  return `<div class="row${it.available===false?' off':''}" id="row-${si}-${ii}">
    <div class="row-fields">
      <input class="row-name" value="${esc(it.name)}" placeholder="Nom" oninput="MENU.sections[${si}].items[${ii}].name=this.value">
      <input class="row-price" value="${esc(it.price)}" placeholder="Prix" oninput="MENU.sections[${si}].items[${ii}].price=this.value">
      <input class="row-desc" value="${esc(it.desc||'')}" placeholder="Description" oninput="MENU.sections[${si}].items[${ii}].desc=this.value">
    </div>
    <div class="row-right">
      <button class="row-del" onclick="delItem(${si},${ii})">✕</button>
      <label class="tog"><input type="checkbox" ${it.available!==false?'checked':''} onchange="toggleItem(${si},${ii},this.checked)"><span class="tsl"></span></label>
    </div>
  </div>`;
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
window.toggleItem=(si,ii,val)=>{ MENU.sections[si].items[ii].available=val; document.getElementById(`row-${si}-${ii}`).className='row'+(val?'':' off'); };
window.delItem=(si,ii)=>{ MENU.sections[si].items.splice(ii,1); render(); };
window.addItem=(si)=>{ MENU.sections[si].items.push({name:'',desc:'',price:'',available:true}); render(); };
window.delSection=(si)=>{ if(confirm('Supprimer ?')){ MENU.sections.splice(si,1); render(); } };
window.addSection=()=>{ MENU.sections.push({title:'Nouvelle section',items:[]}); render(); };

window.publish = async function(){
  const btn=document.getElementById('pub-btn'), icon=document.getElementById('pub-icon'), txt=document.getElementById('pub-txt');
  const st=document.getElementById('status'), stxt=document.getElementById('stxt');
  btn.disabled=true; icon.textContent='⏳'; txt.textContent='Publication…';
  st.className='status'; stxt.textContent='Envoi vers Firebase…';
  try {
    await setDoc(doc(db,'menus',RESTO_ID), MENU);
    st.className='status ok'; stxt.textContent='✓ Menu publié ! Visible instantanément.';
    document.getElementById('last-pub').textContent='Publié à '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    st.className='status ko'; stxt.textContent='✗ Erreur : '+e.message;
  }
  btn.disabled=false; icon.textContent='✓'; txt.textContent='Publier';
};
</script>
</body>
</html>
