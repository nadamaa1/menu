<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Concordia Restaurant</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#faf8f4;font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh}

/* LOGIN */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:#fff;border:1px solid #e8e0d5;border-radius:20px;padding:48px 40px;max-width:360px;width:100%;text-align:center}
.login-card h1{font-family:'Playfair Display',serif;font-size:24px;color:#b83a1a;margin-bottom:6px}
.login-card p{font-size:13px;color:#9a8878;margin-bottom:32px}
.login-card input{width:100%;background:#faf8f4;border:1px solid #e8e0d5;border-radius:10px;padding:14px 16px;font-family:'DM Sans',sans-serif;font-size:15px;outline:none;text-align:center;letter-spacing:4px;margin-bottom:16px}
.login-card input:focus{border-color:#b83a1a}
.login-error{font-size:13px;color:#c0392b;margin-bottom:12px;display:none}

/* ADMIN */
#admin{display:none}
.topbar{background:#fff;border-bottom:1px solid #e8e0d5;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-left h2{font-family:'Playfair Display',serif;font-size:20px;color:#b83a1a}
.topbar-left p{font-size:12px;color:#9a8878;margin-top:2px}
.publish-btn{background:#b83a1a;color:#fff;border:none;padding:12px 28px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px}
.publish-btn:hover{background:#9a2e12}
.publish-btn:disabled{opacity:.5;cursor:not-allowed}
.publish-btn.loading{background:#9a8878}

.content{max-width:640px;margin:0 auto;padding:32px 24px}
.status-bar{background:#fff;border:1px solid #e8e0d5;border-radius:12px;padding:14px 20px;margin-bottom:28px;font-size:13px;color:#7a6a5a;display:flex;align-items:center;gap:10px}
.status-bar.success{border-color:#6abf85;background:#f0faf4;color:#2d7a4a}
.status-bar.error{border-color:#e8a0a0;background:#fdf0f0;color:#b83a1a}
.status-dot{width:8px;height:8px;border-radius:50%;background:#d4c8bc;flex-shrink:0}
.status-bar.success .status-dot{background:#6abf85}
.status-bar.error .status-dot{background:#e86a5a}

.section{margin-bottom:32px}
.section-title{font-family:'Playfair Display',serif;font-size:22px;font-style:italic;color:#b83a1a;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #e8d5c8}

.item-row{background:#fff;border:1px solid #e8e0d5;border-radius:12px;padding:16px 20px;margin-bottom:10px;display:flex;align-items:center;gap:16px;transition:all .2s}
.item-row.unavailable{background:#fdf8f6;border-color:#f0d8d0;opacity:.7}
.item-info{flex:1}
.item-name{font-family:'Playfair Display',serif;font-size:16px;color:#2a2118;margin-bottom:3px}
.item-row.unavailable .item-name{text-decoration:line-through;color:#9a8878}
.item-price{font-size:13px;color:#b83a1a;font-weight:500}
.item-desc{font-size:12px;color:#9a8878;margin-top:3px;line-height:1.4}

/* Toggle */
.tog{position:relative;width:44px;height:24px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-sl{position:absolute;inset:0;background:#d4c8bc;border-radius:12px;cursor:pointer;transition:.2s}
.tog-sl::after{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog input:checked+.tog-sl{background:#6abf85}
.tog input:checked+.tog-sl::after{transform:translateX(20px)}

.tog-label{font-size:12px;color:#9a8878;flex-shrink:0;width:64px;text-align:right}
.item-row:not(.unavailable) .tog-label{color:#6abf85}

/* Bouton */
.btn{display:inline-flex;align-items:center;gap:8px;background:#b83a1a;color:#fff;border:none;padding:12px 28px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;width:100%;justify-content:center;margin-top:8px}
.btn:hover{background:#9a2e12}
.btn:disabled{opacity:.4;cursor:not-allowed}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <h1>Concordia</h1>
    <p>Accès administration menu</p>
    <div class="login-error" id="login-error">Mot de passe incorrect</div>
    <input type="password" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPwd()">
    <button class="btn" onclick="checkPwd()">Connexion</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin">
  <div class="topbar">
    <div class="topbar-left">
      <h2>Concordia Restaurant</h2>
      <p>Gérez les disponibilités du menu</p>
    </div>
    <button class="publish-btn" id="publish-btn" onclick="publish()">
      <span id="publish-icon">✓</span>
      <span id="publish-txt">Publier les changements</span>
    </button>
  </div>

  <div class="content">
    <div class="status-bar" id="status-bar">
      <div class="status-dot"></div>
      <span id="status-txt">Modifiez les disponibilités puis cliquez "Publier"</span>
    </div>

    <div id="menu-sections"></div>
  </div>
</div>

<script>
// ── CONFIG ──
var PASSWORD = 'concordia2024';
var GITHUB_TOKEN = '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';
var GITHUB_OWNER = 'nadamaa1';
var GITHUB_REPO  = 'menu';
var GITHUB_FILE  = 'index.html';

// ── MENU DATA ──
var MENU = {
  name: 'Concordia Restaurant',
  sections: [
    { title: 'Entrées', items: [
      { name: 'Salade de chèvre chaud', desc: 'Toasts de chèvre fondant sur lit de roquette, noix caramélisées, miel de fleurs et vinaigrette balsamique.', price: '9€', available: true },
      { name: 'Tartare de saumon frais', desc: 'Dés de saumon mariné aux agrumes, avocat crémeux, touche de ciboulette, accompagné de blinis croustillants.', price: '11€', available: true },
    ]},
    { title: 'Plats', items: [
      { name: 'Entrecôte grillée, sauce au poivre', desc: 'Entrecôte de bœuf maturée, servie avec frites maison croustillantes et salade verte, nappée de sauce au poivre crémeuse.', price: '24€', available: true },
      { name: 'Magret de canard aux figues', desc: 'Magret de canard rôti, réduction de vin rouge et figues confites, accompagné d\'un écrasé de pommes de terre à l\'huile de truffe.', price: '19€', available: true },
      { name: 'Risotto aux champignons sauvages', desc: 'Risotto crémeux à l\'arôme intense de champignons forestiers, agrémenté de parmesan fraîchement râpé et de persil.', price: '17€', available: true },
    ]},
    { title: 'Desserts', items: [
      { name: 'Tarte tatin maison', desc: 'Pommes caramélisées, pâte feuilletée dorée, servie tiède avec une boule de glace vanille.', price: '6€', available: true },
      { name: 'Café gourmand', desc: 'Sélection de mini-desserts maison : macaron, financier, mousse au chocolat, et sorbet citron, accompagné d\'un espresso.', price: '7€', available: true },
    ]},
  ]
};

// ── LOGIN ──
function checkPwd() {
  var val = document.getElementById('pwd').value;
  if(val === PASSWORD) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('admin').style.display = 'block';
    renderMenu();
  } else {
    var err = document.getElementById('login-error');
    err.style.display = 'block';
    document.getElementById('pwd').value = '';
    setTimeout(function(){ err.style.display='none'; }, 2000);
  }
}

// ── RENDER MENU ──
function renderMenu() {
  var container = document.getElementById('menu-sections');
  container.innerHTML = '';
  MENU.sections.forEach(function(section, si) {
    var div = document.createElement('div');
    div.className = 'section';
    div.innerHTML = '<div class="section-title">'+section.title+'</div>' +
      section.items.map(function(item, ii) {
        return '<div class="item-row'+(item.available?'':' unavailable')+'" id="row-'+si+'-'+ii+'">' +
          '<div class="item-info">' +
            '<div class="item-name">'+item.name+'</div>' +
            '<div class="item-desc">'+item.desc+'</div>' +
            '<div class="item-price">'+item.price+'</div>' +
          '</div>' +
          '<span class="tog-label">'+(item.available?'Dispo':'Indispo')+'</span>' +
          '<label class="tog">' +
            '<input type="checkbox"'+(item.available?' checked':'')+' onchange="toggle('+si+','+ii+',this.checked)">' +
            '<span class="tog-sl"></span>' +
          '</label>' +
        '</div>';
      }).join('');
    container.appendChild(div);
  });
}

function toggle(si, ii, val) {
  MENU.sections[si].items[ii].available = val;
  var row = document.getElementById('row-'+si+'-'+ii);
  row.className = 'item-row' + (val ? '' : ' unavailable');
  row.querySelector('.tog-label').textContent = val ? 'Dispo' : 'Indispo';
}

// ── GÉNÈRE LE HTML DU MENU ──
function buildMenuHTML() {
  var date = new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  var sectionsHTML = MENU.sections.map(function(s) {
    return '<div class="section"><div class="section-title">'+s.title+'</div>' +
      s.items.map(function(it) {
        return '<div class="item'+(it.available?'':' off')+'">' +
          '<div class="item-left">' +
            '<div class="item-name">'+it.name+'</div>' +
            '<div class="item-desc">'+it.desc+'</div>' +
            (it.available?'':'<div class="badge-off">Indisponible aujourd\'hui</div>') +
          '</div>' +
          '<div class="item-right"><div class="item-price">'+it.price+'</div></div>' +
        '</div>';
      }).join('') +
    '</div>';
  }).join('');

  return `<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Concordia Restaurant</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#faf8f4;color:#2a2118;font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh}
.page{max-width:560px;margin:0 auto;padding:48px 28px 80px}
.header{text-align:center;margin-bottom:48px;padding-bottom:32px;border-bottom:1px solid #e8e0d5}
.header h1{font-family:'Playfair Display',serif;font-size:36px;font-weight:600;color:#b83a1a;letter-spacing:-.5px;line-height:1.2;margin-bottom:6px}
.header p{font-size:13px;color:#9a8878;letter-spacing:.04em}
.section{margin-bottom:40px}
.section-title{font-family:'Playfair Display',serif;font-size:28px;font-style:italic;color:#b83a1a;margin-bottom:24px;padding-bottom:10px;border-bottom:1px solid #e8d5c8}
.item{display:flex;align-items:flex-start;gap:12px;padding:16px 0;border-bottom:1px solid #f0ece6}
.item:last-child{border-bottom:none}
.item.off{opacity:.4}
.item-left{flex:1}
.item-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:400;color:#2a2118;margin-bottom:5px;line-height:1.3}
.item.off .item-name{text-decoration:line-through;color:#9a8878}
.item-desc{font-size:13px;color:#7a6a5a;line-height:1.6;font-style:italic}
.item-right{flex-shrink:0;text-align:right;padding-top:2px}
.item-price{font-family:'Playfair Display',serif;font-size:18px;color:#b83a1a;font-weight:400}
.badge-off{display:inline-block;font-size:10px;background:#f5ede8;color:#b83a1a;border:1px solid #e8c8bc;padding:2px 8px;border-radius:100px;margin-top:6px;letter-spacing:.04em}
.footer{text-align:center;margin-top:48px;padding-top:24px;border-top:1px solid #e8e0d5;font-size:12px;color:#b8a898}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>Concordia Restaurant</h1>
    <p>Menu du ${date}</p>
  </div>
  ${sectionsHTML}
  <div class="footer">Concordia Restaurant &nbsp;·&nbsp; ${date}</div>
</div>
</body>
</html>`;
}

// ── PUBLISH VIA GITHUB API ──
async function publish() {
  var btn = document.getElementById('publish-btn');
  var txt = document.getElementById('publish-txt');
  var icon = document.getElementById('publish-icon');
  var statusBar = document.getElementById('status-bar');
  var statusTxt = document.getElementById('status-txt');

  btn.disabled = true;
  btn.className = 'publish-btn loading';
  icon.textContent = '⏳';
  txt.textContent = 'Publication en cours…';

  try {
    // 1. Get current file SHA (needed for update)
    var shaRes = await fetch('https://api.github.com/repos/'+GITHUB_OWNER+'/'+GITHUB_REPO+'/contents/'+GITHUB_FILE, {
      headers: {
        'Authorization': 'token '+GITHUB_TOKEN,
        'Accept': 'application/vnd.github.v3+json'
      }
    });
    var shaData = await shaRes.json();
    var sha = shaData.sha;

    // 2. Build new HTML
    var html = buildMenuHTML();
    var encoded = btoa(unescape(encodeURIComponent(html)));

    // 3. Push to GitHub
    var updateRes = await fetch('https://api.github.com/repos/'+GITHUB_OWNER+'/'+GITHUB_REPO+'/contents/'+GITHUB_FILE, {
      method: 'PUT',
      headers: {
        'Authorization': 'token '+GITHUB_TOKEN,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: 'Mise à jour du menu',
        content: encoded,
        sha: sha
      })
    });

    if(!updateRes.ok) throw new Error('Erreur GitHub '+updateRes.status);

    // Success
    statusBar.className = 'status-bar success';
    statusTxt.textContent = '✓ Menu publié ! Visible sur le site dans ~30 secondes.';
    btn.className = 'publish-btn';
    icon.textContent = '✓';
    txt.textContent = 'Publier les changements';
    btn.disabled = false;

  } catch(err) {
    statusBar.className = 'status-bar error';
    statusTxt.textContent = '✗ Erreur : '+err.message;
    btn.className = 'publish-btn';
    icon.textContent = '✓';
    txt.textContent = 'Réessayer';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
